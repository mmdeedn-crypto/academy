<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية المطور | المهندس علي المعموري</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #050811;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* كود خلفية الفيديو بكامل الأبعاد وبدون زوم قريب */
        .background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            object-fit: cover;
            filter: brightness(0.35) contrast(1.1); /* موازنة السطوع لبروز النصوص */
        }

        /* طبقة حماية برمجية خفيفة فوق الفيديو */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 8, 17, 0.2);
            z-index: -1;
        }

        /* الحاوية الرئيسية - شفافة بالكامل لكي يظهر الفيديو بوضوح */
        .cyber-card {
            background: transparent; 
            width: 100%;
            max-width: 400px;
            padding: 30px 20px;
            position: relative;
            text-align: center;
        }

        /* شارة الاسم العائمة */
        .badge {
            background: rgba(0, 242, 254, 0.1);
            border-right: 3px solid #00f2fe;
            display: inline-block;
            padding: 6px 15px;
            color: #00f2fe;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 25px;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }

        /* العناوين مع ظل خلفي ممتاز لبروز النص فوق الفيديو */
        .main-title {
            font-size: 2.4rem;
            font-weight: 900;
            margin-bottom: 12px;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.6), 0 2px 4px rgba(0,0,0,0.8);
        }

        .subtitle {
            color: #b0c4de;
            font-size: 0.95rem;
            margin-bottom: 40px;
            line-height: 1.6;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* منطقة زر دخول النظام النظيف */
        .login-btn-wrapper {
            padding: 15px 0;
            margin-bottom: 35px;
        }

        .login-btn {
            color: #00f2fe;
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s ease;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5), 0 2px 4px rgba(0,0,0,0.8);
        }

        .login-btn:hover {
            color: #fff;
            text-shadow: 0 0 20px #00f2fe, 0 0 30px #00f2fe;
            transform: scale(1.05);
        }

        /* فواصل قنوات الاتصال */
        .divider {
            display: flex;
            align-items: center;
            color: #8a99ad;
            font-size: 0.85rem;
            margin-bottom: 25px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.15);
            margin: 0 15px;
        }

        /* أزرار التواصل الشفافة 100% وبدون أي إطارات مخربة */
        .contact-item {
            background: transparent;
            border: none;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            margin-bottom: 15px;
            text-decoration: none;
            color: #fff;
            transition: 0.3s ease;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
        }

        .contact-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(-5px);
        }

        .contact-info {
            text-align: right;
        }

        .contact-info span {
            display: block;
            font-size: 0.75rem;
            color: #a0a0a0;
        }

        .contact-info p {
            font-size: 1rem;
            font-weight: 500;
            margin-top: 2px;
        }

        .contact-item i {
            font-size: 1.5rem;
        }
        
        /* ألوان الأيقونات المضيئة */
        .fa-instagram { color: #f9bc2c; filter: drop-shadow(0 0 8px #f9bc2c) !important; }
        .fa-telegram { color: #2ca5e0; filter: drop-shadow(0 0 8px #2ca5e0) !important; }
        .fa-envelope { color: #ea4335; filter: drop-shadow(0 0 8px #ea4335) !important; }

    </style>
</head>

        <h1 class="main-title">أكاديمية المطور</h1>
        <p class="subtitle">بوابة الدخول الآمنة للمنصة والخدمات البرمجية</p>

        <div class="login-btn-wrapper">

        <div class="divider">قنوات الاتصال</div>

            <i class="fa-brands fa-telegram"></i>
        </a>

        <a href="mailto:mmdeedn@gmail.com" class="contact-item" target="_blank">
            <div class="contact-info">
                <span>Email</span>
                <p>mmdeedn@gmail.com</p>
            </div>
            <i class="fa-solid fa-envelope"></i>
        </a>

    </div>

</body>
</html>

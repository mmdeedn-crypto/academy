<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية المطور | المهندس علي المعموري</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #050811;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* كود خلفية الفيديو الثابتة */
        .background-video {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(0.25) contrast(1.1); /* تقليل السطوع لبروز التصميم */
        }

        /* تأثير الشبكة البرمجية فوق الفيديو (اختياري ويعطي طابع سيبراني) */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(18, 24, 38, 0.2) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(18, 24, 38, 0.2) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -1;
        }

        /* الحاوية الرئيسية (نفس اللي بالصورة بالضبط) */
        .cyber-card {
            background: rgba(10, 15, 26, 0.75); /* خلفية شبه شفافة لكي يظهر الفيديو من خلفها */
            backdrop-filter: blur(8px); /* تأثير تغبيش خلف الكرت */
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(0, 242, 254, 0.2);
            padding: 30px 20px;
            position: relative;
            text-align: center;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        /* الخطوط المضيئة فوق وتحت الكرت */
        .cyber-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 15%;
            width: 50%;
            height: 2px;
            background: #00f2fe;
            box-shadow: 0 0 10px #00f2fe;
        }

        .cyber-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 35%;
            width: 40%;
            height: 2px;
            background: #b92b27;
            box-shadow: 0 0 10px #b92b27;
        }

        /* شارة المهندس علي المعموري */
        .badge {
            background: rgba(0, 242, 254, 0.1);
            border-right: 3px solid #00f2fe;
            display: inline-block;
            padding: 6px 15px;
            color: #00f2fe;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        /* العناوين */
        .main-title {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 12px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .subtitle {
            color: #8a99ad;
            font-size: 0.95rem;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* زر دخول النظام */
        .login-btn-wrapper {
            border-top: 1px solid rgba(0, 242, 254, 0.2);
            border-bottom: 1px solid rgba(0, 242, 254, 0.2);
            padding: 15px 0;
            margin-bottom: 35px;
        }

        .login-btn {
            color: #00f2fe;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s ease;
        }

        .login-btn:hover {
            text-shadow: 0 0 15px #00f2fe;
            transform: scale(1.03);
        }

        /* عنوان قنوات الاتصال */
        .divider {
            display: flex;
            align-items: center;
            color: #56667a;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(86, 102, 122, 0.3);
            margin: 0 10px;
        }

        /* كروت وسائل التواصل */
        .contact-item {
            background: rgba(20, 27, 43, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            margin-bottom: 12px;
            text-decoration: none;
            color: #fff;
            transition: 0.3s;
        }

        .contact-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* الخط الذهبي الخاص بإنستغرام مثل الصورة */
        .instagram-card {
            border-left: 3px solid #f9bc2c; 
        }

        .contact-info {
            text-align: right;
        }

        .contact-info span {
            display: block;
            font-size: 0.75rem;
            color: #65758c;
        }

        .contact-info p {
            font-size: 0.95rem;
            font-weight: 500;
            margin-top: 2px;
        }

        .contact-item i {
            font-size: 1.4rem;
        }
        
        .fa-instagram { color: #f9bc2c; }
        .fa-telegram { color: #2ca5e0; }
        .fa-envelope { color: #ea4335; }

    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="background-video">
        <source src="video.mp4" type="video/mp4">
    </video>

    <div class="grid-overlay"></div>

    <div class="cyber-card">
        
        <div class="badge"> 
            <i class="fa-solid fa-terminal" style="font-size: 0.8rem; margin-left: 4px;"></i> المهندس علي المعموري_
        </div>

        <h1 class="main-title">أكاديمية المطور</h1>
        <p class="subtitle">بوابة الدخول الآمنة للمنصة والخدمات البرمجية</p>

        <div class="login-btn-wrapper">
            <a href="https://alikhalid.pythonanywhere.com" class="login-btn" target="_blank">
                <i class="fa-solid fa-right-to-bracket"></i> دخول النظام الآن
            </a>
        </div>

        <div class="divider">قنوات الاتصال</div>

        <a href="https://instagram.com/x.5qe" class="contact-item instagram-card" target="_blank">
            <div class="contact-info">
                <span>Instagram</span>
                <p>x.5qe</p>
            </div>
            <i class="fa-brands fa-instagram"></i>
        </a>

        <a href="https://t.me/c99ol" class="contact-item" target="_blank">
            <div class="contact-info">
                <span>Telegram</span>
                <p>@c99ol</p>
            </div>
            <i class="fa-brands fa-telegram"></i>
        </a>

        <a href="mailto:mmdeedn@gmail.com" class="contact-item" target="_blank">
            <div class="contact-info">
                <span>Email</span>
                <p>mmdeedn@gmail.com</p>
            </div>
            <i class="fa-solid fa-envelope"></i>
        </a>

    </div>

</body>
</html>

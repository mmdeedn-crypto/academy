<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Matrix VIP</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* ========================= */
/* الأساس */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma;
}

body{
    background:#050811;
    color:#fff;
    overflow:hidden;
    height:100vh;
}

/* ========================= */
/* الفيديو (خفيف) */
/* ========================= */

.background-video{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-3;
    filter:brightness(0.35);
}

/* طبقة */
.overlay{
    position:fixed;
    inset:0;
    background:radial-gradient(circle at center, rgba(0,242,254,0.06), rgba(0,0,0,0.75));
    z-index:-2;
}

/* grid خفيف */
.grid{
    position:fixed;
    inset:0;
    background-image:
    linear-gradient(rgba(0,242,254,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,242,254,0.04) 1px, transparent 1px);
    background-size:45px 45px;
    z-index:-1;
}

/* ========================= */
/* المحتوى */
/* ========================= */

.container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* الكارت */

.card{
    width:100%;
    max-width:420px;

    text-align:center;

    backdrop-filter:blur(10px);
    background:rgba(255,255,255,0.04);

    border:1px solid rgba(0,242,254,0.15);
    border-radius:25px;

    padding:28px 20px;
}

/* الروبوت */

.robot{
    font-size:3rem;
    animation:float 2s infinite ease-in-out;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

/* نص متغير */

.text{
    margin-top:10px;
    background:rgba(0,242,254,0.08);
    border:1px solid rgba(0,242,254,0.2);
    padding:12px;
    border-radius:12px;
    color:#cfe9ff;
}

/* ========================= */
/* الصورة (سريعة جداً) */
/* ========================= */

.profile{
    width:150px;
    height:150px;
    margin:22px auto;
    position:relative;
}

.profile img{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #00f2fe;
}

/* إطار خفيف */
.profile::before{
    content:"";
    position:absolute;
    inset:-10px;
    border-radius:50%;
    border:2px solid transparent;
    border-top:2px solid #00f2fe;
    border-right:2px solid rgba(0,242,254,0.35);
    animation:spin 1.5s linear infinite;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

/* ========================= */
/* الزر */
/* ========================= */

.vip-btn{
    margin-top:22px;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;

    padding:15px;

    border-radius:16px;

    text-decoration:none;
    font-weight:bold;

    color:#00f2fe;

    background:rgba(0,242,254,0.08);

    border:1px solid rgba(0,242,254,0.35);

    transition:0.3s;
}

.vip-btn:hover{
    transform:translateY(-4px);
    box-shadow:0 0 20px rgba(0,242,254,0.4);
    color:#fff;
}

</style>
</head>

<body>

<!-- الفيديو (محسن) -->
<video id="bgVideo"
muted
loop
playsinline
preload="metadata"
class="background-video">

<source src="video.mp4" type="video/mp4">

</video>

<div class="overlay"></div>
<div class="grid"></div>

<!-- المحتوى -->
<div class="container">

<div class="card">

<div class="robot">🤖</div>

<div class="text" id="txt">
جارِ التحميل...
</div>

<div class="profile">

<!-- صورة سريعة -->
<img src="profile.jpg" loading="eager" decoding="async">

</div>

<h2>أكاديمية المطور</h2>

<p>واجهة تعليم الأمن السيبراني</p>

<a class="vip-btn"
href="https://alikhalid.pythonanywhere.com"
target="_blank">

<i class="fa-solid fa-shield-halved"></i>
دخول النظام

</a>

</div>

</div>

<script>

/* تشغيل الفيديو بعد فتح الصفحة مباشرة */

window.addEventListener("load", () => {
    const video = document.getElementById("bgVideo");

    setTimeout(() => {
        video.play();
    }, 300);
});

/* نص متغير */

const txt = document.getElementById("txt");

const messages = [
"مرحباً بك ⚡",
"المهندس علي المعموري",
"Cyber Security 🔐",
"Web Development 💻",
"Matrix VIP 🚀"
];

let i = 0;

setInterval(() => {
i++;
if(i >= messages.length) i = 0;
txt.textContent = messages[i];
}, 2500);

</script>

</body>
</html>

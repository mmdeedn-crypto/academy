<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>أكاديمية المطور</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* الأساس */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
    background:#050811;
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow-x:hidden;
    overflow-y:auto;
    padding:20px;
}

/* الفيديو */
.background-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
    filter:brightness(0.35) contrast(1.1);
}

/* طبقة */
.grid-overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(5,8,17,0.25);
    z-index:-1;
}

/* الكارت */
.cyber-card{
    width:100%;
    max-width:420px;
    text-align:center;

    backdrop-filter:blur(8px);
    background:rgba(255,255,255,0.03);

    border:1px solid rgba(0,242,254,0.15);
    border-radius:20px;

    padding:30px 20px;
}

/* الشارة */
.badge{
    background:rgba(0,242,254,0.1);
    border-right:3px solid #00f2fe;

    display:inline-block;
    padding:6px 15px;

    color:#00f2fe;
    font-size:0.9rem;
    font-weight:bold;

    margin-bottom:15px;
}

/* ===================== */
/* الروبوت الجديد 🤖 */
/* ===================== */

.guide-character{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;

    margin-bottom:15px;
}

.guide-character img{
    width:70px;
    height:70px;

    animation:float 2s infinite ease-in-out;
}

@keyframes float{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-8px); }
}

.speech-bubble{
    background:rgba(0,242,254,0.12);
    border:1px solid rgba(0,242,254,0.4);

    padding:10px 12px;
    border-radius:12px;

    font-size:0.8rem;

    max-width:220px;

    backdrop-filter:blur(10px);
}

/* ===================== */
/* الصورة + الإطار القديم */
/* ===================== */

.profile-wrapper{
    position:relative;
    width:140px;
    height:140px;
    margin:0 auto 15px auto;
}

.profile-wrapper img{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;

    border:3px solid #00f2fe;
}

.ring{
    position:absolute;
    top:-10px;
    left:-10px;
    width:160px;
    height:160px;

    border-radius:50%;

    border-top:2px solid #00f2fe;
    border-bottom:2px solid rgba(0,242,254,0.3);

    animation:spin 2s linear infinite;
}

.ring2{
    position:absolute;
    top:-18px;
    left:-18px;
    width:176px;
    height:176px;

    border-radius:50%;

    border:2px dashed rgba(0,242,254,0.25);

    animation:spinReverse 4s linear infinite;
}

@keyframes spin{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
}

@keyframes spinReverse{
    from{ transform:rotate(360deg); }
    to{ transform:rotate(0deg); }
}

/* النصوص */
.main-title{
    font-size:2.2rem;
    margin-bottom:10px;
}

.subtitle{
    font-size:0.9rem;
    color:#b0c4de;
    margin-bottom:20px;
}

/* زر */
.login-btn{
    display:flex;
    justify-content:center;
    align-items:center;

    gap:10px;

    padding:12px;
    border-radius:12px;

    background:rgba(0,242,254,0.12);
    border:1px solid rgba(0,242,254,0.3);

    color:#00f2fe;
    text-decoration:none;

    margin-bottom:15px;
}

/* زر الصوت */
#sound-toggle{
    position:fixed;
    bottom:20px;
    left:20px;

    width:55px;
    height:55px;

    border:none;
    border-radius:50%;

    background:rgba(0,242,254,0.15);
    color:#00f2fe;

    cursor:pointer;
    z-index:999;
}

</style>
</head>

<body>

<!-- الفيديو -->
<video id="bgVideo" autoplay loop muted playsinline class="background-video">
<source src="video.mp4" type="video/mp4">
</video>

<div class="grid-overlay"></div>

<!-- زر الصوت -->
<button id="sound-toggle">
<i class="fa-solid fa-volume-high"></i>
</button>

<div class="cyber-card">

<!-- الروبوت -->
<div class="guide-character">
<img src="robot.png" alt="bot">
<div class="speech-bubble" id="speech">
مرحباً 👋 أنا أشرح عن الموقع
</div>
</div>

<div class="badge">المهندس علي المعموري_</div>

<!-- الصورة -->
<div class="profile-wrapper">
<img src="profile.jpg">
<div class="ring"></div>
<div class="ring2"></div>
</div>

<h1 class="main-title">أكاديمية المطور</h1>

<p class="subtitle">منصة تعليم الأمن السيبراني</p>

<a class="login-btn" href="#">
دخول النظام
</a>

</div>

<script>

const video = document.getElementById("bgVideo");
const btn = document.getElementById("sound-toggle");
const speech = document.getElementById("speech");
const wrapper = document.querySelector(".profile-wrapper");

video.volume = 1;

/* الصوت */
btn.addEventListener("click", async () => {

    video.muted = !video.muted;

    if(!video.muted){
        await video.play();
        btn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>';
        startPulse();
    } else {
        btn.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
    }

});

/* نبض الصورة */
let running = false;

function startPulse(){

    if(running) return;
    running = true;

    function animate(){
        requestAnimationFrame(animate);

        if(video.muted){
            wrapper.style.transform = "scale(1)";
            wrapper.style.filter = "none";
            return;
        }

        let beat = 1 + Math.random() * 0.05;

        wrapper.style.transform = `scale(${beat})`;

        wrapper.style.filter = `
            drop-shadow(0 0 10px #00f2fe)
            drop-shadow(0 0 25px rgba(0,242,254,0.6))
        `;
    }

    animate();
}

/* كلام الروبوت */
const messages = [
    "مرحباً 👋 أنا مساعد الموقع",
    "هذا موقع المهندس علي المعموري",
    "مختص بالأمن السيبراني 🔐",
    "يتعلم تطوير الويب 💻",
    "منصة تعليمية تفاعلية 🚀"
];

let i = 0;

setInterval(() => {
    i++;
    if(i >= messages.length) i = 0;
    speech.textContent = messages[i];
}, 3000);

</script>

</body>
</html>

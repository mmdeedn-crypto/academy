<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Matrix VIP</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* ========================= */
/* الأساس */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma;
}

body{
    background:#050811;
    color:#fff;
    overflow:hidden;
    height:100vh;
}

/* ========================= */
/* Loader */
/* ========================= */

#loader{
    position:fixed;
    inset:0;
    background:#050811;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#00f2fe;
    font-size:1.2rem;
    z-index:99999;
}

/* ========================= */
/* الفيديو */
/* ========================= */

.background-video{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-3;
    filter:brightness(0.35);
}

/* overlay */

.overlay{
    position:fixed;
    inset:0;
    background:radial-gradient(circle at center, rgba(0,242,254,0.08), rgba(0,0,0,0.7));
    z-index:-2;
}

/* grid */

.grid{
    position:fixed;
    inset:0;
    background-image:
    linear-gradient(rgba(0,242,254,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,242,254,0.05) 1px, transparent 1px);
    background-size:40px 40px;
    z-index:-1;
}

/* ========================= */
/* layout */
/* ========================= */

.container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* card */

.card{
    width:100%;
    max-width:430px;
    text-align:center;

    backdrop-filter:blur(12px);
    background:rgba(255,255,255,0.04);

    border:1px solid rgba(0,242,254,0.15);
    border-radius:28px;

    padding:30px 20px;

    box-shadow:0 0 40px rgba(0,242,254,0.1);
}

/* robot */

.robot{
    font-size:3rem;
    animation:float 2s infinite ease-in-out;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

.text{
    margin-top:10px;
    background:rgba(0,242,254,0.08);
    border:1px solid rgba(0,242,254,0.25);
    padding:12px;
    border-radius:14px;
    color:#cfe9ff;
}

/* ========================= */
/* صورة سريعة */
/* ========================= */

.profile{
    width:150px;
    height:150px;
    margin:25px auto;
    position:relative;
}

.profile img{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #00f2fe;
}

/* إطار */

.profile::before{
    content:"";
    position:absolute;
    inset:-10px;
    border-radius:50%;
    border:2px solid transparent;
    border-top:2px solid #00f2fe;
    border-right:2px solid rgba(0,242,254,0.4);
    animation:spin 1.5s linear infinite;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

/* ========================= */
/* زر الدخول */
/* ========================= */

.vip-btn{
    position:relative;

    margin-top:25px;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;

    padding:16px;

    border-radius:18px;

    text-decoration:none;

    color:#00f2fe;
    font-weight:bold;

    background:rgba(0,242,254,0.08);

    border:1px solid rgba(0,242,254,0.4);

    overflow:hidden;

    transition:0.3s;
}

.vip-btn:hover{
    transform:translateY(-5px);
    box-shadow:0 0 25px rgba(0,242,254,0.5);
    border-color:#00f2fe;
    color:#fff;
}

/* ========================= */
/* أنيميشن النص */
/* ========================= */

@keyframes fade{
    0%,100%{opacity:1;}
}

/* ========================= */

</style>
</head>

<body>

<!-- Loader -->
<div id="loader">⚡ Loading Matrix VIP...</div>

<!-- الفيديو (محسن) -->
<video id="bgVideo"
autoplay
muted
loop
playsinline
preload="auto"
class="background-video">

<source src="video.mp4" type="video/mp4">

</video>

<div class="overlay"></div>
<div class="grid"></div>

<!-- المحتوى -->
<div class="container">

<div class="card">

<div class="robot">🤖</div>

<div class="text" id="txt">
جارِ التحميل...
</div>

<div class="profile">

<!-- صورة سريعة -->
<img src="profile.jpg" loading="eager" decoding="async">

</div>

<h2>أكاديمية المطور</h2>

<p>واجهة تعليم الأمن السيبراني</p>

<!-- زر سريع -->
<a class="vip-btn"
href="https://alikhalid.pythonanywhere.com"
target="_blank">

<i class="fa-solid fa-shield-halved"></i>
دخول النظام

</a>

</div>

</div>

<script>

/* loader سريع */

window.addEventListener("load", () => {

    setTimeout(() => {
        document.getElementById("loader").style.opacity = "0";

        setTimeout(() => {
            document.getElementById("loader").remove();
        }, 300);

    }, 600);

});

/* نص متغير */

const txt = document.getElementById("txt");

const messages = [
"مرحباً بك داخل النظام ⚡",
"المهندس علي المعموري",
"Cyber Security 🔐",
"Web Development 💻",
"Matrix VIP 🚀"
];

let i = 0;

setInterval(() => {

i++;
if(i>=messages.length) i=0;

txt.textContent = messages[i];

},2500);

</script>

</body>
</html>

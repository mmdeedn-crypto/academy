<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>أكاديمية المطور</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* ========================= */
/* الأساس */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma;
}

body{
    background:#050811;
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow-x:hidden;
    padding:20px;
}

/* ========================= */
/* الفيديو */
/* ========================= */

.background-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
    filter:brightness(0.35);
}

.grid-overlay{
    position:fixed;
    inset:0;
    background:rgba(5,8,17,0.25);
    z-index:-1;
}

/* ========================= */
/* شاشة البصمة */
/* ========================= */

#fingerprint-screen{
    position:fixed;
    inset:0;

    background:#050811;

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:99999;

    animation:screenFade 1s ease;
}

.finger-box{
    position:relative;
    text-align:center;

    animation:zoomIn 1.2s ease;
}

/* دائرة النيون */

.glow-circle{
    position:absolute;

    width:220px;
    height:220px;

    border-radius:50%;

    background:rgba(0,242,254,0.08);

    filter:blur(25px);

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    animation:pulseGlow 2s infinite;
}

/* البصمة */

.finger-box i{
    position:relative;
    z-index:2;

    font-size:8rem;
    color:#00f2fe;

    animation:fingerPulse 1.5s infinite;
}

.finger-box h3{
    margin-top:20px;
    font-size:1.5rem;

    animation:textFade 2s infinite alternate;
}

.finger-box p{
    margin-top:10px;
    color:#9fb4c7;
}

/* خط السكان */

.scan-line{
    position:absolute;

    left:50%;
    transform:translateX(-50%);

    width:120px;
    height:4px;

    background:#00f2fe;

    box-shadow:0 0 15px #00f2fe;

    animation:scan 2s linear infinite;
}

/* الأشعة */

.rays{
    position:absolute;

    top:50%;
    left:50%;

    width:20px;
    height:20px;

    transform:translate(-50%,-50%);

    opacity:0;
}

.rays::before,
.rays::after{
    content:"";

    position:absolute;

    width:240px;
    height:2px;

    background:#00f2fe;

    box-shadow:0 0 20px #00f2fe;

    top:50%;
    left:50%;

    transform-origin:center;
}

.rays::before{
    transform:
    translate(-50%,-50%)
    rotate(0deg);
}

.rays::after{
    transform:
    translate(-50%,-50%)
    rotate(90deg);
}

.rays.active{
    animation:rayBurst 1s ease forwards;
}

/* ========================= */
/* الحركات */
/* ========================= */

@keyframes rayBurst{

    0%{
        opacity:0;
        transform:
        translate(-50%,-50%)
        scale(0.2);
    }

    40%{
        opacity:1;
    }

    100%{
        opacity:0;
        transform:
        translate(-50%,-50%)
        scale(2.5);
    }

}

@keyframes scan{

    0%{
        top:20%;
        opacity:0;
    }

    20%{
        opacity:1;
    }

    100%{
        top:75%;
        opacity:0;
    }

}

@keyframes fingerPulse{

    0%,100%{
        transform:scale(1);
        filter:drop-shadow(0 0 10px #00f2fe);
    }

    50%{
        transform:scale(1.08);
        filter:drop-shadow(0 0 25px #00f2fe);
    }

}

@keyframes pulseGlow{

    0%,100%{
        transform:
        translate(-50%,-50%)
        scale(1);
    }

    50%{
        transform:
        translate(-50%,-50%)
        scale(1.15);
    }

}

@keyframes zoomIn{

    from{
        opacity:0;
        transform:scale(0.7);
    }

    to{
        opacity:1;
        transform:scale(1);
    }

}

@keyframes textFade{

    from{
        opacity:0.6;
    }

    to{
        opacity:1;
    }

}

@keyframes screenFade{

    from{
        opacity:0;
    }

    to{
        opacity:1;
    }

}

/* ========================= */
/* الكارت */
/* ========================= */

.cyber-card{
    width:100%;
    max-width:430px;

    text-align:center;

    backdrop-filter:blur(10px);
    background:rgba(255,255,255,0.03);

    border-radius:20px;
    padding:30px 20px;

    border:1px solid rgba(0,242,254,0.15);
}

/* الروبوت */

.robot-emoji{
    font-size:3rem;
    animation:float 2s infinite ease-in-out;
}

@keyframes float{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-8px);
    }

}

.speech-bubble{
    background:rgba(0,242,254,0.12);
    border:1px solid rgba(0,242,254,0.4);

    padding:10px;
    border-radius:12px;

    margin:10px auto;

    max-width:250px;
}

/* ========================= */
/* الصورة */
/* ========================= */

.profile-wrapper{
    position:relative;

    width:140px;
    height:140px;

    margin:15px auto;
}

.profile-wrapper img{
    width:100%;
    height:100%;

    border-radius:50%;
    object-fit:cover;

    border:3px solid #00f2fe;
}

/* الإطار */

.ring{
    position:absolute;
    inset:-14px;

    border-radius:50%;

    border:2px solid transparent;
    border-top:2px solid #00f2fe;
    border-right:2px solid rgba(0,242,254,0.5);

    box-shadow:0 0 20px #00f2fe;

    animation:spin 1.2s linear infinite;
}

.ring::after{
    content:"";

    position:absolute;
    inset:-8px;

    border-radius:50%;

    border:1px dashed rgba(0,242,254,0.25);

    animation:spinReverse 3s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

@keyframes spinReverse{
    to{
        transform:rotate(-360deg);
    }
}

/* ========================= */
/* النص */
/* ========================= */

h2{
    margin-top:10px;
    margin-bottom:8px;
    font-size:2rem;
}

p{
    color:#b7c6d8;
    margin-bottom:18px;
}

/* ========================= */
/* زر الدخول */
/* ========================= */

.login-btn{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;

    width:100%;

    padding:13px;
    margin-bottom:12px;

    border-radius:14px;

    background:rgba(0,242,254,0.10);
    border:1px solid rgba(0,242,254,0.25);

    color:#00f2fe;
    text-decoration:none;
    font-weight:bold;

    transition:0.3s;
}

.login-btn:hover{
    background:#00f2fe;
    color:#000;

    transform:translateY(-3px);

    box-shadow:0 0 20px rgba(0,242,254,0.4);
}

/* ========================= */
/* التواصل */
/* ========================= */

.contact-section{
    margin-top:18px;
}

.contact-card{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:14px 16px;
    margin-bottom:12px;

    border-radius:14px;

    background:rgba(255,255,255,0.04);
    border:1px solid rgba(0,242,254,0.15);

    backdrop-filter:blur(10px);

    color:#fff;
    text-decoration:none;

    position:relative;
    overflow:hidden;

    transition:0.3s;
}

.contact-card:hover{
    transform:translateY(-4px);

    border-color:#00f2fe;

    box-shadow:0 0 15px rgba(0,242,254,0.25);
}

.contact-card::after{
    content:"";

    position:absolute;

    bottom:0;
    left:0;

    width:0%;
    height:2px;

    background:#00f2fe;

    transition:0.3s;
}

.contact-card:hover::after{
    width:100%;
}

.contact-card i{
    font-size:1.4rem;
    color:#00f2fe;
}

.info span{
    font-size:0.75rem;
    color:#aaa;
}

.info p{
    margin-top:3px;
    font-weight:bold;
    color:#fff;
}

/* ========================= */
/* زر الصوت */
/* ========================= */

#sound-toggle{
    position:fixed;

    bottom:20px;
    left:20px;

    width:55px;
    height:55px;

    border:none;
    border-radius:50%;

    background:rgba(0,242,254,0.15);
    color:#00f2fe;

    font-size:1.2rem;

    cursor:pointer;

    z-index:9999;
}

</style>
</head>

<body>

<!-- شاشة البصمة -->

<div class="finger-box">

<p id="loading-text">
جاري التحقق الأمني...
</p>

<!-- الفيديو -->

<video id="bgVideo"
autoplay

muted
playsinline
class="background-video">

</video>

<script>

/* ========================= */
/* البصمة */
/* ========================= */

const fingerprint =
document.getElementById(
"fingerprint-screen"
);

const loadingText =
document.getElementById(
"loading-text"
);

const rays =
document.querySelector(".rays");

/* نجاح التحقق */

setTimeout(() => {

    loadingText.innerText =
    "تم التحقق بنجاح ✅";

    rays.classList.add("active");

},2200);

/* إخفاء الشاشة */

setTimeout(() => {

    fingerprint.style.transition =
    "1s";

    fingerprint.style.opacity =
    "0";

    fingerprint.style.transform =
    "scale(1.1)";

    setTimeout(() => {

        fingerprint.style.display =
        "none";

    },1000);

},3800);

/* ========================= */
/* الصوت */
/* ========================= */

const video =
document.getElementById("bgVideo");

const btn =
document.getElementById(
"sound-toggle"
);

btn.addEventListener(
"click",

async () => {

    video.muted =
    !video.muted;

    if(!video.muted){

        await video.play();

        btn.innerHTML =
        '<i class="fa-solid fa-volume-xmark"></i>';

    }else{

        btn.innerHTML =
        '<i class="fa-solid fa-volume-high"></i>';

    }

});

/* ========================= */
/* كلام الروبوت */
/* ========================= */

const speech =
document.getElementById(
"speech"
);

const messages = [

"مرحباً 👋 أنا مساعد الموقع",

"هذا موقع المهندس علي المعموري",

"مختص بالأمن السيبراني 🔐",

"تطوير واجهات ومواقع حديثة 💻",

"Dashboard System 🚀"

];

let i = 0;

setInterval(() => {

    i++;

    if(i >= messages.length){
        i = 0;
    }

    speech.textContent =
    messages[i];

},3000);

</script>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المطور | المهندس علي المعموري</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --cyan: #00f3ff;
            --purple: #bc13fe;
            --dark-bg: #090a0f;
            --card-bg: rgba(15, 17, 26, 0.85);
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            /* خلفية شبكية برمجية */
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* الشكل المميز للبطاقة بزوايا مقصوصة */
        .tech-card {
            position: relative;
            background: var(--card-bg);
            width: 100%;
            max-width: 450px;
            padding: 40px 30px;
            /* قص الزوايا لشكل هندسي مميز */
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
            border: 1px solid rgba(0, 243, 255, 0.2);
            text-align: center;
            backdrop-filter: blur(10px);
            animation: glitch-load 1s ease-out;
        }

        /* خطوط مضيئة تزيينية للبطاقة */
        .tech-card::before {
            content: '';
            position: absolute;
            top: 0; left: 10%;
            width: 50%; height: 2px;
            background: var(--cyan);
            box-shadow: 0 0 10px var(--cyan);
        }

        .tech-card::after {
            content: '';
            position: absolute;
            bottom: 0; right: 10%;
            width: 50%; height: 2px;
            background: var(--purple);
            box-shadow: 0 0 10px var(--purple);
        }

        @keyframes glitch-load {
            0% { opacity: 0; transform: scale(0.95) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* شارة المطور بستايل Terminal */
        .dev-badge {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(0, 243, 255, 0.1);
            color: var(--cyan);
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            letter-spacing: 1px;
            border-left: 3px solid var(--cyan);
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .dev-badge span {
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
        }

        /* نصوص الهيدر */
        .header h1 {
            color: var(--text-main);
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 35px;
        }

        /* زر الدخول الرئيسي بتأثير النيون */
        .btn-cyber {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px;
            background: transparent;
            color: var(--cyan);
            text-decoration: none;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--cyan);
            cursor: pointer;
            transition: 0.3s;
            overflow: hidden;
            margin-bottom: 35px;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
        }

        .btn-cyber::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: var(--cyan);
            transition: 0.4s;
            z-index: -1;
        }

        .btn-cyber:hover {
            color: var(--dark-bg);
            box-shadow: 0 0 20px var(--cyan);
        }

        .btn-cyber:hover::before {
            left: 0;
        }

        /* قسم وسائل التواصل */
        .social-title {
            color: var(--text-muted);
            font-size: 12px;
            margin-bottom: 15px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .social-title::before, .social-title::after {
            content: '';
            height: 1px;
            width: 30px;
            background: rgba(255,255,255,0.2);
        }

        .social-grid {
            display: grid;
            gap: 12px;
        }

        .social-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            text-decoration: none;
            text-align: right;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* تأثير إضاءة جانبي للحسابات */
        .social-item::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 3px; height: 100%;
            background: transparent;
            transition: 0.3s;
        }

        .social-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(-5px);
        }

        .instagram-link:hover::before { background: #fccc63; box-shadow: 0 0 10px #fccc63; }
        .telegram-link:hover::before { background: #0088cc; box-shadow: 0 0 10px #0088cc; }
        .email-link:hover::before { background: #ea4335; box-shadow: 0 0 10px #ea4335; }

        .social-item i {
            font-size: 22px;
            width: 30px;
            text-align: center;
        }
        
        .fa-instagram { color: #fccc63; }
        .fa-telegram { color: #0088cc; }
        .fa-envelope { color: #ea4335; }

        .social-text {
            display: flex;
            flex-direction: column;
        }

        .social-label { font-size: 11px; color: var(--text-muted); }
        .social-username { font-size: 15px; font-weight: 500; direction: ltr; font-family: 'Share Tech Mono', monospace; }

    </style>
</head>
<body>

    <div class="tech-card">
        <div class="dev-badge">
            <i class="fas fa-terminal"></i> <span>المهندس علي المعموري</span>_
        </div>
        
        <div class="header">
            <h1>أكاديمية المطور</h1>
            <p>بوابة الدخول الآمنة للمنصة والخدمات البرمجية</p>
        </div>

        <a href="https://alikhalid.pythonanywhere.com" class="btn-cyber">
            دخول النظام الآن <i class="fas fa-sign-in-alt"></i>
        </a>

        <div class="social-title">قنوات الاتصال</div>
        
        <div class="social-grid">
            <a href="https://instagram.com/x.5qe" target="_blank" class="social-item instagram-link">
                <i class="fab fa-instagram"></i>
                <div class="social-text">
                    <span class="social-label">Instagram</span>
                    <span class="social-username">x.5qe</span>
                </div>
            </a>

            <a href="https://t.me/c990l" target="_blank" class="social-item telegram-link">
                <i class="fab fa-telegram"></i>
                <div class="social-text">
                    <span class="social-label">Telegram</span>
                    <span class="social-username">@c990l</span>
                </div>
            </a>

            <a href="mailto:mmdeedn@gmail.com" class="social-item email-link">
                <i class="fas fa-envelope"></i>
                <div class="social-text">
                    <span class="social-label">Email</span>
                    <span class="social-username">mmdeedn@gmail.com</span>
                </div>
            </a>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>أكاديمية المطور</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* ========================= */
/* الأساس */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma;
}

body{
    background:#050811;
    color:#fff;
    min-height:100vh;
    overflow-x:hidden;
}

/* ========================= */
/* الفيديو */
/* ========================= */

.background-video{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
    filter:brightness(0.35);
}

/* طبقة خفيفة */
.grid-overlay{
    position:fixed;
    inset:0;
    background:rgba(5,8,17,0.25);
    z-index:-1;
}

/* ========================= */
/* الكارت */
/* ========================= */

.cyber-card{
    width:100%;
    max-width:420px;
    margin:auto;
    padding:30px 20px;
    text-align:center;
}

/* شارة */
.badge{
    display:inline-block;
    padding:6px 12px;
    margin-bottom:20px;

    background:rgba(0,242,254,0.1);
    border-right:3px solid #00f2fe;

    color:#00f2fe;
    font-size:0.9rem;
}

/* عنوان */
.main-title{
    font-size:2rem;
    margin-bottom:10px;
}

.subtitle{
    color:#b0c4de;
    margin-bottom:25px;
}

/* ========================= */
/* زر الدخول */
/* ========================= */

.login-btn{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;

    padding:14px;
    margin-bottom:25px;

    border-radius:14px;

    text-decoration:none;

    color:#00f2fe;

    background:rgba(0,242,254,0.08);

    border:1px solid rgba(0,242,254,0.3);

    transition:0.3s;
}

.login-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 0 20px rgba(0,242,254,0.4);
}

/* ========================= */
/* الصورة */
/* ========================= */

.profile{
    width:140px;
    height:140px;
    margin:20px auto;
    position:relative;
}

.profile img{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #00f2fe;
}

/* إطار بسيط */
.profile::before{
    content:"";
    position:absolute;
    inset:-10px;
    border-radius:50%;
    border-top:2px solid #00f2fe;
    border-right:2px solid rgba(0,242,254,0.4);
    animation:spin 1.5s linear infinite;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

/* ========================= */
/* التواصل */
/* ========================= */

.contact-item{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:14px;
    margin-bottom:12px;

    border-radius:12px;

    text-decoration:none;
    color:#fff;

    background:rgba(255,255,255,0.04);
    border:1px solid rgba(0,242,254,0.15);

    transition:0.3s;
}

.contact-item:hover{
    transform:translateX(-4px);
    border-color:#00f2fe;
}

.contact-info span{
    font-size:0.75rem;
    color:#a0a0a0;
}

.contact-info p{
    margin-top:3px;
}

.contact-item i{
    color:#00f2fe;
    font-size:1.3rem;
}

</style>
</head>

<body>

<!-- الفيديو -->
<video id="bgVideo"
autoplay
loop
muted
playsinline
preload="metadata"
class="background-video">

<source src="video.mp4" type="video/mp4">

</video>

<div class="grid-overlay"></div>

<!-- الكارت -->
<div class="cyber-card">

<div class="badge">
<i class="fa-solid fa-terminal"></i>
 المهندس علي المعموري
</div>

<h1 class="main-title">أكاديمية المطور</h1>

<p class="subtitle">بوابة تعليم الأمن السيبراني</p>

<!-- زر الدخول -->
<a class="login-btn"
href="https://alikhalid.pythonanywhere.com"
target="_blank">

<i class="fa-solid fa-right-to-bracket"></i>
دخول النظام

</a>

<!-- الصورة -->
<div class="profile">
<img src="profile.jpg" loading="eager" decoding="async">
</div>

<!-- التواصل -->
<a class="contact-item" href="https://instagram.com/x.5qe">
<div class="contact-info">
<span>Instagram</span>
<p>x.5qe</p>
</div>
<i class="fa-brands fa-instagram"></i>
</a>

<a class="contact-item" href="https://t.me/c99ol">
<div class="contact-info">
<span>Telegram</span>
<p>@c99ol</p>
</div>
<i class="fa-brands fa-telegram"></i>
</a>

<a class="contact-item" href="mailto:mmdeedn@gmail.com">
<div class="contact-info">
<span>Email</span>
<p>mmdeedn@gmail.com</p>
</div>
<i class="fa-solid fa-envelope"></i>
</a>

</div>

<script>

/* تشغيل الفيديو بشكل أخف */
window.addEventListener("load", () => {
    const v = document.getElementById("bgVideo");
    setTimeout(() => {
        v.play();
    }, 300);
});

</script>

</body>
</html>

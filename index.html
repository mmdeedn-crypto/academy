<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة إعدادية النهرين | بإشراف المهندس علي المعموري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root {
            --primary: #1e40af; /* أزرق ملكي */
            --accent: #38bdf8;
            --dark: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* تأثير الخلفية الهندسية */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1;
        }

        .main-container {
            width: 90%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            z-index: 10;
        }

        .school-logo {
            width: 100px;
            height: 100px;
            background: var(--primary);
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            border: 4px solid var(--accent);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 10px;
            color: white;
        }

        .badge {
            background: rgba(56, 189, 248, 0.2);
            color: var(--accent);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 25px;
            border: 1px solid var(--accent);
        }

        .supervision {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }

        .supervision span {
            color: var(--accent);
            font-weight: bold;
        }

        .nav-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background: var(--primary);
            color: white;
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn:hover {
            background: var(--accent);
            color: var(--dark);
            transform: translateY(-3px);
        }

        .btn-portal {
            background: white;
            color: var(--dark);
        }

        footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="school-logo">
            <i class="fas fa-university"></i>
        </div>
        
        <h1>إعدادية النهرين المهنية الأهلية</h1>
        <div class="badge">نظام الإدارة الإلكتروني</div>
        
        <div class="supervision">
            بإشراف <br> <span>المهندس علي المعموري</span>
        </div>

        <div class="nav-buttons">
            <a href="https://Alikhalid.pythonanywhere.com" class="btn btn-portal">
                <i class="fas fa-sign-in-alt"></i>
                دخول لوحة التحكم
            </a>
            <a href="#" class="btn">
                <i class="fas fa-users-cog"></i>
                إدارة شؤون الطلاب
            </a>
        </div>

        <footer>
            جميع الحقوق محفوظة &copy; 2026 <br>
            المطور: المهندس علي المعموري
        </footer>
    </div>

</body>
</html>

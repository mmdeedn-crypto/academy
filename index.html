<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>أكاديمية المطور</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* الأساس */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma;
}

body{
    background:#050811;
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    padding:20px;
}

/* الفيديو */
.background-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
    filter:brightness(0.35);
}

/* طبقة */
.grid-overlay{
    position:fixed;
    inset:0;
    background:rgba(5,8,17,0.25);
    z-index:-1;
}

/* الكارت */
.cyber-card{
    width:100%;
    max-width:430px;
    text-align:center;
    backdrop-filter:blur(10px);
    background:rgba(255,255,255,0.03);
    border-radius:20px;
    padding:30px 20px;
    border:1px solid rgba(0,242,254,0.15);
}

/* الروبوت */
.robot-emoji{
    font-size:3rem;
    animation:float 2s infinite ease-in-out;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

.speech-bubble{
    background:rgba(0,242,254,0.12);
    border:1px solid rgba(0,242,254,0.4);
    padding:10px;
    border-radius:12px;
    margin:10px auto;
    max-width:250px;
    font-size:0.85rem;
}

/* الصورة */
.profile-wrapper{
    position:relative;
    width:140px;
    height:140px;
    margin:15px auto;
}

.profile-wrapper img{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #00f2fe;
}

/* الإطار */
.ring{
    position:absolute;
    inset:-14px;
    border-radius:50%;
    border-top:2px solid #00f2fe;
    border-right:2px solid rgba(0,242,254,0.5);
    animation:spin 1.2s linear infinite;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

/* زر الدخول */
.login-btn{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    width:100%;
    padding:13px;
    margin-top:10px;
    border-radius:14px;
    background:rgba(0,242,254,0.10);
    border:1px solid rgba(0,242,254,0.25);
    color:#00f2fe;
    text-decoration:none;
    font-weight:bold;
}

.login-btn:hover{
    background:#00f2fe;
    color:#000;
    transform:translateY(-3px);
}

/* زر الصوت */
.sound-btn{
    position:fixed;
    bottom:20px;
    left:20px;
    width:55px;
    height:55px;
    border:none;
    border-radius:50%;
    background:rgba(0,242,254,0.15);
    color:#00f2fe;
    font-size:1.2rem;
    z-index:9999;
}

</style>
</head>

<body>

<!-- الفيديو -->
<video id="bgVideo" autoplay loop muted playsinline class="background-video">
<source src="video.mp4" type="video/mp4">
</video>

<div class="grid-overlay"></div>

<!-- زر الصوت -->
<button class="sound-btn" id="soundBtn">
<i class="fa-solid fa-volume-high"></i>
</button>

<div class="cyber-card">

<div class="robot-emoji">🤖</div>

<div class="speech-bubble" id="speech">مرحباً 👋 أنا مساعد الموقع</div>

<div class="profile-wrapper">
<img src="profile.jpg">
<div class="ring"></div>
</div>

<h2>أكاديمية المطور</h2>
<p>منصة تعليم الأمن السيبراني</p>

<!-- زر واحد فقط -->
<a class="login-btn"
href="https://alikhalid.pythonanywhere.com"
target="_blank">

<i class="fa-solid fa-shield-halved"></i>
دخول النظام

</a>

</div>

<script>

/* الصوت */
const video = document.getElementById("bgVideo");
const btn = document.getElementById("soundBtn");

btn.addEventListener("click", () => {
    video.muted = !video.muted;

    btn.innerHTML = video.muted
    ? '<i class="fa-solid fa-volume-high"></i>'
    : '<i class="fa-solid fa-volume-xmark"></i>';
});

/* كلام الروبوت */
const speech = document.getElementById("speech");

const messages = [
"مرحباً 👋 أنا مساعد الموقع",
"أكاديمية الأمن السيبراني",
"تطوير مواقع حديثة 💻",
"Matrix System 🚀"
];

let i = 0;

setInterval(() => {
    i++;
    if(i >= messages.length) i = 0;
    speech.textContent = messages[i];
}, 3000);

</script>

</body>
</html>

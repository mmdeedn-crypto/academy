<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>أكاديمية المطور</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* ========================= */
/* الأساس */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma;
}

body{
    background:#050811;
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow-x:hidden;
    padding:20px;
}

/* ========================= */
/* الفيديو */
/* ========================= */

.background-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
    filter:brightness(0.35);
}

.grid-overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(5,8,17,0.25);
    z-index:-1;
}

/* ========================= */
/* الكارت */
/* ========================= */

.cyber-card{
    width:100%;
    max-width:430px;

    text-align:center;

    backdrop-filter:blur(10px);
    background:rgba(255,255,255,0.03);

    border-radius:20px;
    padding:30px 20px;

    border:1px solid rgba(0,242,254,0.15);
}

/* ========================= */
/* الروبوت */
/* ========================= */

.robot-emoji{
    font-size:3rem;
    animation:float 2s infinite ease-in-out;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

.speech-bubble{
    background:rgba(0,242,254,0.12);
    border:1px solid rgba(0,242,254,0.4);

    padding:10px;
    border-radius:12px;

    margin:10px auto;

    max-width:250px;
    font-size:0.85rem;
}

/* ========================= */
/* الصورة */
/* ========================= */

.profile-wrapper{
    position:relative;
    width:140px;
    height:140px;
    margin:15px auto;
}

.profile-wrapper img{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;

    border:3px solid #00f2fe;
}

/* ========================= */
/* الإطار التفاعلي */
/* ========================= */

.ring{
    position:absolute;
    inset:-14px;
    border-radius:50%;

    border:2px solid transparent;
    border-top:2px solid #00f2fe;
    border-right:2px solid rgba(0,242,254,0.5);

    box-shadow:0 0 20px #00f2fe;

    animation:spin 1.2s linear infinite;
}

/* طبقة ثانية */

.ring::after{
    content:"";
    position:absolute;
    inset:-8px;
    border-radius:50%;

    border:1px dashed rgba(0,242,254,0.25);

    animation:spinReverse 3s linear infinite;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

@keyframes spinReverse{
    to{transform:rotate(-360deg);}
}

/* ========================= */
/* العنوان */
/* ========================= */

h2{
    margin-top:10px;
    margin-bottom:8px;
    font-size:2rem;
}

p{
    color:#b7c6d8;
    margin-bottom:18px;
}

/* ========================= */
/* الأزرار */
/* ========================= */

.login-btn{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;

    width:100%;

    padding:13px;
    margin-bottom:12px;

    border-radius:14px;

    background:rgba(0,242,254,0.10);
    border:1px solid rgba(0,242,254,0.25);

    color:#00f2fe;
    text-decoration:none;
    font-weight:bold;

    transition:0.3s;
}

.login-btn:hover{
    background:#00f2fe;
    color:#000;

    transform:translateY(-3px);

    box-shadow:0 0 20px rgba(0,242,254,0.4);
}

/* ========================= */
/* التواصل */
/* ========================= */

.contact-section{
    margin-top:18px;
}

.contact-card{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:14px 16px;
    margin-bottom:12px;

    border-radius:14px;

    background:rgba(255,255,255,0.04);
    border:1px solid rgba(0,242,254,0.15);

    backdrop-filter:blur(10px);

    color:#fff;
    text-decoration:none;

    position:relative;
    overflow:hidden;

    transition:0.3s;
}

.contact-card:hover{
    transform:translateY(-4px);

    border-color:#00f2fe;

    box-shadow:0 0 15px rgba(0,242,254,0.25);
}

.contact-card::after{
    content:"";
    position:absolute;

    bottom:0;
    left:0;

    width:0%;
    height:2px;

    background:#00f2fe;

    transition:0.3s;
}

.contact-card:hover::after{
    width:100%;
}

.contact-card i{
    font-size:1.4rem;
    color:#00f2fe;
}

.info span{
    font-size:0.75rem;
    color:#aaa;
}

.info p{
    margin-top:3px;
    font-weight:bold;
    color:#fff;
}

/* ========================= */
/* زر الصوت */
/* ========================= */

#sound-toggle{
    position:fixed;

    bottom:20px;
    left:20px;

    width:55px;
    height:55px;

    border:none;
    border-radius:50%;

    background:rgba(0,242,254,0.15);
    color:#00f2fe;

    font-size:1.2rem;

    cursor:pointer;

    z-index:9999;
}

</style>
</head>

<body>

<!-- الفيديو -->
<video id="bgVideo" autoplay loop muted playsinline class="background-video">
<source src="video.mp4" type="video/mp4">
</video>

<div class="grid-overlay"></div>

<!-- زر الصوت -->
<button id="sound-toggle">
<i class="fa-solid fa-volume-high"></i>
</button>

<div class="cyber-card">

<!-- الروبوت -->
<div class="robot-emoji">🤖</div>

<div class="speech-bubble" id="speech">
مرحباً 👋 أنا مساعد الموقع
</div>

<!-- الصورة -->
<div class="profile-wrapper">
<img src="profile.jpg">
<div class="ring"></div>
</div>

<!-- العنوان -->
<h2>أكاديمية المطور</h2>

<p>منصة تعليم الأمن السيبراني وتطوير الويب</p>

<!-- النظام الأول -->
<a class="login-btn"
href="https://alikhalid.pythonanywhere.com"
target="_blank">

<i class="fa-solid fa-right-to-bracket"></i>
منصة الأكاديمية

</a>

<!-- النظام الثاني -->
<a class="login-btn"
href="https://cyber-matrix-learn--alioommzzxx.replit.app/"
target="_blank">

<i class="fa-solid fa-shield-halved"></i>
Cyber Matrix Learn

</a>

<!-- التواصل -->
<div class="contact-section">

<a class="contact-card"
href="https://instagram.com/x.5qe"
target="_blank">

<div class="info">
<span>Instagram</span>
<p>x.5qe</p>
</div>

<i class="fa-brands fa-instagram"></i>

</a>

<a class="contact-card"
href="https://t.me/c99ol"
target="_blank">

<div class="info">
<span>Telegram</span>
<p>@c99ol</p>
</div>

<i class="fa-brands fa-telegram"></i>

</a>

<a class="contact-card"
href="mailto:mmdeedn@gmail.com">

<div class="info">
<span>Email</span>
<p>mmdeedn@gmail.com</p>
</div>

<i class="fa-solid fa-envelope"></i>

</a>

</div>

</div>

<script>

/* ========================= */
/* الصوت */
/* ========================= */

const video = document.getElementById("bgVideo");
const btn = document.getElementById("sound-toggle");

btn.addEventListener("click", async () => {

    video.muted = !video.muted;

    if(!video.muted){

        await video.play();

        btn.innerHTML =
        '<i class="fa-solid fa-volume-xmark"></i>';

    }else{

        btn.innerHTML =
        '<i class="fa-solid fa-volume-high"></i>';
    }

});

/* ========================= */
/* كلام الروبوت */
/* ========================= */

const speech = document.getElementById("speech");

const messages = [

"مرحباً 👋 أنا مساعد الموقع",
"هذا موقع المهندس علي المعموري",
"مختص بالأمن السيبراني 🔐",
"تطوير واجهات ومواقع حديثة 💻",
"Cyber Matrix Learn 🚀"

];

let i = 0;

setInterval(() => {

    i++;

    if(i >= messages.length){
        i = 0;
    }

    speech.textContent = messages[i];

}, 3000);

</script>

</body>
</html>

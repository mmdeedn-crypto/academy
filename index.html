<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Matrix VIP | علي المعموري</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma;
}

body{
    background:#050811;
    color:white;
    overflow-y:auto;        /* ✅ تم التصليح - كان overflow:hidden */
    min-height:100vh;       /* ✅ تم التصليح - كان height:100vh */
}

.background-video{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-3;
    filter:brightness(0.35) contrast(1.1);
}

.overlay{
    position:fixed;
    inset:0;
    background:radial-gradient(circle at center, rgba(0,242,254,0.08), rgba(0,0,0,0.7));
    z-index:-2;
}

.grid{
    position:fixed;
    inset:0;
    background-image:
    linear-gradient(rgba(0,242,254,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,242,254,0.05) 1px, transparent 1px);
    background-size:40px 40px;
    z-index:-1;
    animation:gridMove 10s linear infinite;
}

@keyframes gridMove{
    from{ transform:translateY(0); }
    to{ transform:translateY(40px); }
}

#boot-screen{
    position:fixed;
    inset:0;
    background:#02040a;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:99999;
    transition:1s;
}

.fingerprint-container{
    position:relative;
    width:240px;
    height:240px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.circle{
    position:absolute;
    border-radius:50%;
    border:2px solid rgba(0,242,254,0.25);
    animation:rotate 8s linear infinite;
}

.circle:nth-child(1){ width:240px; height:240px; }
.circle:nth-child(2){ width:190px; height:190px; animation-direction:reverse; }
.circle:nth-child(3){ width:140px; height:140px; }

.fingerprint{
    font-size:7rem;
    color:#00f2fe;
    z-index:5;
    animation:pulse 1.5s infinite;
    filter:drop-shadow(0 0 20px #00f2fe);
}

.scan{
    position:absolute;
    width:180px;
    height:4px;
    background:#00f2fe;
    box-shadow:0 0 15px #00f2fe;
    animation:scanMove 2s infinite;
}

.boot-title{
    margin-top:25px;
    font-size:1.4rem;
    letter-spacing:2px;
    color:#00f2fe;
}

.boot-sub{
    margin-top:10px;
    color:#8aa0b8;
}

.container{
    position:relative;
    width:100%;
    min-height:100vh;       /* ✅ تم التصليح - كان height:100vh */
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.cyber-card{
    width:100%;
    max-width:430px;
    backdrop-filter:blur(12px);
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(0,242,254,0.15);
    border-radius:28px;
    padding:30px 22px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,242,254,0.12);
}

.robot{
    font-size:3rem;
    animation:float 2s infinite;
}

.robot-text{
    margin-top:12px;
    background:rgba(0,242,254,0.08);
    border:1px solid rgba(0,242,254,0.25);
    padding:12px;
    border-radius:14px;
    color:#d7e7f5;
}

.profile-area{
    position:relative;
    width:160px;
    height:160px;
    margin:25px auto;
}

.profile-area img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:50%;
    border:3px solid #00f2fe;
}

.energy-ring{
    position:absolute;
    inset:-14px;
    border-radius:50%;
    border-top:3px solid #00f2fe;
    border-right:3px solid rgba(0,242,254,0.3);
    animation:ringRotate 1.5s linear infinite;
    box-shadow:0 0 25px #00f2fe;
}

.scan-layer{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border-radius:50%;
    overflow:hidden;
}

.scan-layer::before{
    content:"";
    position:absolute;
    width:100%;
    height:35%;
    background:linear-gradient(to bottom, transparent, rgba(0,242,254,0.25), transparent);
    animation:scanFace 3s infinite;
}

.title{
    font-size:2rem;
    font-weight:bold;
    margin-top:10px;
    text-shadow:0 0 15px rgba(0,242,254,0.5);
}

.sub{
    margin-top:8px;
    color:#b4c6d8;
    line-height:1.7;
}

.enter-btn{
    position:relative;
    margin-top:25px;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    padding:16px;
    border-radius:18px;
    text-decoration:none;
    color:#fff;
    font-size:1.1rem;
    font-weight:bold;
    overflow:hidden;
    background:rgba(0,242,254,0.08);
    border:1px solid rgba(0,242,254,0.35);
    transition:0.4s;
}

.enter-btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:100%;
    height:100%;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    transition:0.6s;
}

.enter-btn:hover::before{ left:120%; }

.enter-btn:hover{
    transform:translateY(-5px);
    box-shadow:0 0 30px rgba(0,242,254,0.45);
    border-color:#00f2fe;
}

.contacts{ margin-top:22px; }

.contact{
    position:relative;
    display:flex;
    justify-content:space-between;
    align-items:center;
    text-decoration:none;
    color:white;
    padding:14px 16px;
    margin-bottom:12px;
    border-radius:15px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(0,242,254,0.12);
    overflow:hidden;
    transition:0.3s;
}

.contact::after{
    content:"";
    position:absolute;
    bottom:0;
    left:0;
    width:0%;
    height:2px;
    background:#00f2fe;
    transition:0.4s;
}

.contact:hover::after{ width:100%; }

.contact:hover{
    transform:translateY(-4px);
    border-color:#00f2fe;
}

.contact i{ font-size:1.4rem; color:#00f2fe; }
.contact span{ color:#9fb4c7; font-size:0.8rem; }

#sound-btn{
    position:fixed;
    bottom:20px;
    left:20px;
    width:60px;
    height:60px;
    border:none;
    border-radius:50%;
    background:rgba(0,242,254,0.12);
    color:#00f2fe;
    font-size:1.2rem;
    cursor:pointer;
    backdrop-filter:blur(10px);
    z-index:9999;
}

@keyframes rotate{ to{ transform:rotate(360deg); } }
@keyframes pulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.08); }
}
@keyframes scanMove{
    0%{ top:25%; opacity:0; }
    30%{ opacity:1; }
    100%{ top:70%; opacity:0; }
}
@keyframes ringRotate{ to{ transform:rotate(360deg); } }
@keyframes scanFace{
    0%{ top:-40%; }
    100%{ top:120%; }
}
@keyframes float{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-8px); }
}

</style>
</head>

<body>

<div class="fingerprint-container">
<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

</div>

<script>

const boot = document.getElementById("boot-screen");
const bootText = document.getElementById("boot-text");

setTimeout(()=>{ bootText.innerHTML = "ACCESS GRANTED ✅"; }, 2200);
setTimeout(()=>{
    boot.style.opacity = "0";
    setTimeout(()=>{ boot.style.display = "none"; }, 1000);
}, 4200);

const robotText = document.getElementById("robotText");
const messages = [
    "مرحباً بك داخل نظام Matrix VIP",
    "المهندس علي المعموري 🔥",
    "Cyber Security Expert 🔐",
    "Web Developer 💻",
    "Artificial Intelligence Interface 🤖"
];

let i = 0;
setInterval(()=>{
    i++;
    if(i >= messages.length){ i = 0; }
    robotText.innerHTML = messages[i];
}, 3000);

/* ✅ الصوت - تم التصليح */
const video = document.getElementById("bgVideo");
const soundBtn = document.getElementById("sound-btn");

soundBtn.addEventListener("click", async ()=>{

    if(video.muted){
        video.muted = false;
        try{ await video.play(); }catch(e){}
        soundBtn.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
    } else {
        video.muted = true;
        soundBtn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>';
    }

});

</script>

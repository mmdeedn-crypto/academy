<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المهندس علي المعموري | ملف التواصل</title>
  <meta name="description" content="تواصل معي عبر جميع منصاتي - YouTube, TikTok, Telegram, Instagram" />
  <meta name="theme-color" content="#0a0a12" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Noto+Kufi+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0a12;--surface:#12121e;--border:rgba(120,80,255,.18);
      --accent:#7c3aed;--accent2:#a855f7;--glow:rgba(124,58,237,.35);
      --text:#e8e4ff;--muted:#6b658a;--card:rgba(18,18,30,.85);--r:20px;
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'Noto Kufi Arabic','Sora',sans-serif;min-height:100vh;overflow-x:hidden}
    .bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(124,58,237,.22) 0%,transparent 60%),
                 radial-gradient(ellipse 60% 50% at 80% 90%,rgba(59,28,120,.28) 0%,transparent 55%),
                 radial-gradient(ellipse 40% 40% at 60% 40%,rgba(168,85,247,.08) 0%,transparent 50%)}
    .bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:linear-gradient(rgba(120,80,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(120,80,255,.04) 1px,transparent 1px);
      background-size:48px 48px;mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black 30%,transparent 100%)}
    
    .container{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:48px 20px 80px;display:flex;flex-direction:column;align-items:center;gap:0}
    
    /* ── Profile Section ── */
    .profile{text-align:center;margin-bottom:32px;animation:fadeUp .8s cubic-bezier(.22,1,.36,1) forwards}
    .avatar-wrap{position:relative;width:120px;height:120px;margin:0 auto 16px}
    .avatar-glow{position:absolute;inset:-10px;background:var(--accent);border-radius:50%;filter:blur(24px);opacity:.3;animation:pulse 3s infinite alternate}
    .avatar{width:100%;height:100%;border-radius:50%;object-fit:cover;border:3px solid var(--accent);position:relative;z-index:1;background:#1a1a2e}
    .name{font-family:'Sora',sans-serif;font-size:1.8rem;font-weight:800;letter-spacing:-.02em;background:linear-gradient(to right,#fff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
    .bio{font-size:.9rem;color:var(--muted);max-width:85%;margin:0 auto}
    
    /* ── Links ── */
    .links{width:100%;display:flex;flex-direction:column;gap:12px;animation:fadeUp .8s cubic-bezier(.22,1,.36,1) .15s both}
    .link-card{
      display:flex;align-items:center;gap:16px;padding:16px 20px;
      background:var(--card);border:1px solid var(--border);border-radius:var(--r);
      text-decoration:none;color:var(--text);backdrop-filter:blur(12px);
      transition:all .3s cubic-bezier(.22,1,.36,1);position:relative;overflow:hidden
    }
    .link-card::before{
      content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);
      transform:translateX(-100%);transition:transform .6s ease
    }
    .link-card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 8px 32px var(--glow)}
    .link-card:hover::before{transform:translateX(100%)}
    .link-icon{
      width:40px;height:40px;border-radius:12px;background:rgba(124,58,237,.1);
      display:flex;align-items:center;justify-content:center;color:var(--accent2);
      font-size:20px;transition:transform .3s ease
    }
    .link-card:hover .link-icon{transform:scale(1.1);background:var(--accent);color:#fff}
    .link-text{font-size:1rem;font-weight:600;flex-grow:1}
    .link-arrow{color:var(--muted);transition:transform .3s ease}
    .link-card:hover .link-arrow{transform:translateX(-4px);color:var(--accent2)}
    
    /* ── Academy / Form Button ── */
    .academy-section{width:100%;margin-top:20px;animation:fadeUp 1s cubic-bezier(.22,1,.36,1) .45s both}
    .academy-btn{
      display:flex;align-items:center;gap:16px;width:100%;
      background:linear-gradient(135deg,rgba(15,10,30,.9),rgba(30,15,60,.9));
      border:1px solid rgba(168,85,247,.4);
      border-radius:var(--r);padding:18px 22px;
      text-decoration:none;color:var(--text);
      backdrop-filter:blur(12px);
      position:relative;overflow:hidden;cursor:pointer;
      transition:transform .25s ease,box-shadow .25s ease,border-color .25s ease;
      text-align: right;
    }
    .academy-btn:hover{
      transform:translateY(-4px) scale(1.015);
      box-shadow:0 12px 40px rgba(124,58,237,.4),0 0 60px rgba(124,58,237,.15);
      border-color:rgba(168,85,247,.7);
    }
    .academy-icon{
      width:52px;height:52px;border-radius:14px;
      background:linear-gradient(135deg,#4c1d95,#7c3aed);
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;font-size:24px;
      box-shadow:0 4px 16px rgba(124,58,237,.5);
      position:relative;z-index:1;
    }
    .academy-info{flex:1;min-width:0;position:relative;z-index:1}
    .academy-label{font-size:.75rem;font-weight:600;color:var(--accent2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
    .academy-title{font-family:'Sora',sans-serif;font-size:1rem;font-weight:800;color:#fff}
    .academy-sub{font-size:.78rem;color:var(--muted);margin-top:2px}
    
    /* ── Modal Styles ── */
    .modal {
        display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
        background-color: rgba(10, 10, 18, 0.85); backdrop-filter: blur(8px);
        align-items: center; justify-content: center; padding: 20px;
    }
    .modal.active { display: flex; animation: fadeIn 0.3s ease; }
    .modal-content {
        background: var(--surface); border: 1px solid var(--border);
        border-radius: var(--r); width: 100%; max-width: 450px; padding: 30px 24px;
        position: relative; box-shadow: 0 10px 40px rgba(124, 58, 237, 0.3);
        max-height: 90vh; overflow-y: auto;
    }
    .modal-content::-webkit-scrollbar { width: 6px; }
    .modal-content::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    
    .close-btn {
        position: absolute; top: 16px; right: 20px; font-size: 28px; color: var(--muted);
        cursor: pointer; transition: color 0.2s; line-height: 1;
    }
    .close-btn:hover { color: var(--accent2); }
    .form-title { font-family: 'Sora', sans-serif; font-size: 1.2rem; font-weight: 700; color: #fff; margin-bottom: 20px; text-align: center; }
    .form-group { margin-bottom: 16px; text-align: right; }
    .form-group label { display: block; font-size: 0.85rem; color: #c4b5fd; margin-bottom: 8px; font-weight: 600;}
    .form-control {
        width: 100%; background: rgba(18, 18, 30, 0.6); border: 1px solid rgba(120, 80, 255, 0.2);
        border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: 'Noto Kufi Arabic', sans-serif;
        font-size: 0.9rem; transition: border-color 0.3s;
    }
    .form-control:focus { outline: none; border-color: var(--accent2); box-shadow: 0 0 10px rgba(168, 85, 247, 0.1); }
    textarea.form-control { resize: vertical; min-height: 90px; }
    .submit-btn {
        width: 100%; background: linear-gradient(135deg, #7c3aed, #a855f7); color: #fff;
        border: none; padding: 14px; border-radius: 12px; font-family: 'Sora', sans-serif; font-weight: 700;
        font-size: 1rem; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; margin-top: 10px;
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(124, 58, 237, 0.5); }
    
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{to{transform:scale(1.1);opacity:.5}}
  </style>
</head>
<body>
<div class="bg-canvas"></div>
<div class="bg-grid"></div>

<div class="container">
  
  <div class="profile">
    <div class="avatar-wrap">
      <div class="avatar-glow"></div>
      <img src="img/logo.jpg" alt="المهندس علي المعموري" class="avatar" id="profile-img" onerror="this.src='https://ui-avatars.com/api/?name=Ali+Al-Maamouri&background=7c3aed&color=fff&size=200'"/>
    </div>
    <h1 class="name">المهندس علي المعموري</h1>
    <p class="bio">حياك الله! مبرمج ومطور ويب</p>
  </div>

  <div class="links">
    <!-- Instagram -->
    <a href="https://instagram.com/mt5xr" class="link-card" target="_blank" rel="noopener">
      <div class="link-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>

    <!-- YouTube -->
    <a href="https://youtube.com/@mt5xr" class="link-card" target="_blank" rel="noopener">
      <div class="link-icon">

      </div>
    </a>

    <!-- TikTok -->
    <a href="https://tiktok.com/@mt5xr" class="link-card" target="_blank" rel="noopener">
      <div class="link-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"></path></svg>
      </div>
      <span class="link-text">TikTok</span>
      <div class="link-arrow">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>

    <!-- Telegram -->
    <a href="https://t.me/mt5xr" class="link-card" target="_blank" rel="noopener">

      <div class="link-arrow">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>

  </div>
  
  <div class="academy-section">
    <button id="openFormBtn" class="academy-btn">

<!-- Modal Form -->
<div id="contactModal" class="modal">
  <div class="modal-content">
    <span class="close-btn" id="closeFormBtn">&times;</span>
    <div class="form-title">معلومات التواصل والخبرة</div>
    
    <form action="https://formsubmit.co/alioommzzxx@gmail.com" method="POST">
      <input type="hidden" name="_subject" value="رسالة جديدة من موقعك المهندس علي المعموري !">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_captcha" value="false">
      
      <div class="form-group">
        <label>الاسم الكريم</label>
        <input type="text" name="الاسم" class="form-control" placeholder="اكتب اسمك هنا..." required>
      </div>
      
      <div class="form-group">
        <label>الإيميل للتواصل</label>
        <input type="email" name="الايميل" class="form-control" placeholder="example@email.com" required>
      </div>
      
      <div class="form-group">
        <label>مستوى خبرتك البرمجية (من 1 لـ 10)</label>
        <input type="number" name="الخبرة_البرمجية" class="form-control" min="1" max="10" placeholder="مثال: 7" required>
      </div>
      
      <div class="form-group">
        <label>شنو اكثر لغات البرمجة اللي تضبطها؟</label>
        <input type="text" name="لغات_البرمجة" class="form-control" placeholder="بايثون، فلاتر، HTML، الخ..." required>
      </div>
      
      <div class="form-group">
        <label>شنو طموحك او اكثر شي تحب تسويه بمجالك؟</label>
        <textarea name="تفاصيل_اضافية" class="form-control" placeholder="سولفلنا براحتك وبلهجتنا الحلوة..." required></textarea>
      </div>
      
      <button type="submit" class="submit-btn">إرسال المعلومات</button>
    </form>
  </div>
</div>

<script>
  const modal = document.getElementById('contactModal');
  const openBtn = document.getElementById('openFormBtn');
  const closeBtn = document.getElementById('closeFormBtn');

  openBtn.addEventListener('click', () => {
    modal.classList.add('active');
  });

  closeBtn.addEventListener('click', () => {
    modal.classList.remove('active');
  });

  window.addEventListener('click', (e) => {
    if (e.target === modal) {
      modal.classList.remove('active');
    }
  });
</script>

</body>

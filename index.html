<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية المطور</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* التنسيق الأساسي */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #050811;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            padding: 40px 20px;
        }

        /* خلفية الفيديو - ثابتة */
        .background-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            filter: brightness(0.4); /* تباين خفيف جداً لبروز النصوص */
        }

        /* طبقة الشاشة الفوقية */
        .grid-overlay {
            position: fixed;
            inset: 0;
            background: rgba(5, 8, 17, 0.1);
            z-index: -1;
        }

        /* زر التحكم بالصوت العائم جهة اليسار */
        .volume-control-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: transparent; /* شفاف بالكامل */
            border: 2px solid #00f2fe;
            color: #00f2fe;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .volume-control-btn:hover {
            background: #00f2fe;
            color: #000;
            transform: scale(1.08);
        }

        /* الكارت الرئيسي - تم حذف التغويش واللون والخلفية تماماً */
        .cyber-card {
            width: 100%;
            max-width: 430px;
            text-align: center;
            background: transparent !important; /* إلغاء أي خلفية بيضاء */
            backdrop-filter: none !important; /* حذف التغويش نهائياً */
            -webkit-backdrop-filter: none !important; /* حذف التغويش لسفاري */
            border-radius: 20px;
            padding: 25px 18px;
            border: 2px solid rgba(0, 242, 254, 0.4); /* إطار مضيء فقط */
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.1);
            margin: auto;
        }

        h2 {
            margin-top: 10px;
            font-size: 1.6rem;
            text-shadow: 2px 2px 4px #000; /* ظل خلف النص ليكون واضحاً فوق الفيديو */
        }

        .cyber-card > p {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 15px;
            text-shadow: 1px 1px 3px #000;
        }

        /* حركة الروبوت الآلي */
        .robot-emoji {
            font-size: 3rem;
            animation: float 2s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* فقاعة المحادثة - شفافة تماماً */
        .speech-bubble {
            background: transparent !important; /* حذف اللون */
            backdrop-filter: none !important; /* حذف التغويش */
            border: 1px solid rgba(0, 242, 254, 0.5);
            padding: 10px;
            border-radius: 12px;
            margin: 10px auto;
            max-width: 250px;
            font-size: 0.85rem;
            transition: opacity 0.2s ease-in-out;
            color: #00f2fe;
            text-shadow: 1px 1px 2px #000;
        }

        /* إطار الصورة الشخصية */
        .profile-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 15px auto;
        }

        .profile-wrapper img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #00f2fe;
        }

        /* الحلقة المضيئة المتحركة */
        .ring {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border-top: 2px solid #00f2fe;
            border-right: 2px solid rgba(0, 242, 254, 0.2);
            animation: spin 1.2s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* زر الدخول - شفاف بالكامل وبدون أي تغويش */
        .login-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 13px;
            margin-top: 15px;
            border-radius: 14px;
            background: transparent !important; /* شفاف */
            backdrop-filter: none !important; /* بدون تغويش */
            border: 2px solid rgba(0, 242, 254, 0.6); 
            color: #00f2fe;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
            text-shadow: 1px 1px 2px #000;
        }

        .login-btn:hover {
            background: #00f2fe !important;
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 242, 254, 0.5);
            text-shadow: none;
        }

        .login-btn:active {
            transform: scale(0.95) translateY(0);
        }

        /* أقسام التواصل الإجتماعي */
        .contact-section {
            margin-top: 18px;
        }

        /* كروت التواصل - شفافة تماماً وبدون أي تغويش */
        .contact-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            margin-bottom: 10px;
            border-radius: 14px;
            background: transparent !important; /* شفاف */
            backdrop-filter: none !important; /* بدون تغويش */
            border: 1px solid rgba(0, 242, 254, 0.4);
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease;
        }

        .contact-card:hover {
            transform: translateY(-4px);
            border-color: #00f2fe;
            background: rgba(0, 242, 254, 0.1) !important;
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.2);
        }

        .contact-card i {
            color: #00f2fe;
            font-size: 1.3rem;
        }

        .info {
            text-align: right;
        }

        .info span {
            font-size: 0.75rem;
            color: #ccc;
            display: block;
            text-shadow: 1px 1px 2px #000;
        }

        .info p {
            margin-top: 3px;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
        }
    </style>
</head>

<body>

    <button class="volume-control-btn" id="volumeBtn" title="تشغيل/كتم الصوت">
        <i class="fa-solid fa-volume-xmark" id="volumeIcon"></i>
    </button>

    <video id="bgVideo" autoplay loop muted playsinline class="background-video">
        <source src="video.mp4" type="video/mp4">
    </video>

    <div class="grid-overlay"></div>

    <div class="cyber-card">

        <div class="robot-emoji">🤖</div>

        <div class="speech-bubble" id="speech">مرحباً 👋 أنا مساعد الموقع</div>

        <div class="profile-wrapper">
            <img src="profile.jpg" alt="Profile">
            <div class="ring"></div>
        </div>

        <h2>أكاديمية المطور</h2>
        <p>منصة تعليم الأمن السيبراني</p>

        <a class="login-btn" href="https://alikhalid.pythonanywhere.com" target="_blank">
            <i class="fa-solid fa-shield-halved"></i>
            دخول النظام
        </a>

        <div class="contact-section">

            <a class="contact-card" href="https://instagram.com/x.5qe" target="_blank">
                <div class="info">
                    <span>Instagram</span>
                    <p>x.5qe</p>
                </div>
                <i class="fa-brands fa-instagram"></i>
            </a>

            <a class="contact-card" href="https://t.me/c99ol" target="_blank">
                <div class="info">
                    <span>Telegram</span>
                    <p>@c99ol</p>
                </div>
                <i class="fa-brands fa-telegram"></i>
            </a>

            <a class="contact-card" href="mailto:mmdeedn@gmail.com">
                <div class="info">
                    <span>Email</span>
                    <p>mmdeedn@gmail.com</p>
                </div>
                <i class="fa-solid fa-envelope"></i>
            </a>

        </div>

    </div>

    <script>
        // نصوص المساعد الآلي المتغيرة
        const speech = document.getElementById("speech");
        const messages = [
            "مرحباً 👋 أنا مساعد الموقع",
            "أكاديمية الأمن السيبراني",
            "تطوير مواقع حديثة 💻",
            "Matrix System 🚀"
        ];

        let i = 0;

        setInterval(() => {
            i = (i + 1) % messages.length;
            speech.style.opacity = 0;
            setTimeout(() => {
                speech.textContent = messages[i];
                speech.style.opacity = 1;
            }, 200);
        }, 3000);

        // برمجة زر الصوت
        const video = document.getElementById('bgVideo');
        const volumeBtn = document.getElementById('volumeBtn');
        const volumeIcon = document.getElementById('volumeIcon');

        volumeBtn.addEventListener('click', () => {
            if (video.muted) {
                video.muted = false;
                volumeIcon.className = "fa-solid fa-volume-high";
            } else {
                video.muted = true;
                volumeIcon.className = "fa-solid fa-volume-xmark";
            }
        });

        // تشغيل الفيديو التلقائي
        document.addEventListener('DOMContentLoaded', () => {
            if (video) {
                video.play().catch(error => {
                    console.log("نظام الخلفية جاهز.", error);
                });
            }
        });
    </script>

</body>
</html>

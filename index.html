<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>أكاديمية المطور</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma;
}

body{
    background:#050811;
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow-x:hidden;
    padding:20px;
}

/* الفيديو */
.background-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
    filter:brightness(0.35);
}

/* طبقة */
.grid-overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(5,8,17,0.25);
    z-index:-1;
}

/* الكارت */
.cyber-card{
    width:100%;
    max-width:420px;
    text-align:center;

    backdrop-filter:blur(8px);
    background:rgba(255,255,255,0.03);

    border-radius:20px;
    padding:30px 20px;

    border:1px solid rgba(0,242,254,0.15);

    position:relative;
    z-index:2;
}

/* الروبوت */
.robot-emoji{
    font-size:3rem;
    animation:float 2s infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

.speech-bubble{
    background:rgba(0,242,254,0.12);
    border:1px solid rgba(0,242,254,0.4);
    padding:10px;
    border-radius:12px;
    margin:10px auto;
    max-width:240px;
    font-size:0.85rem;
}

/* الصورة */
.profile-wrapper{
    position:relative;
    width:140px;
    height:140px;
    margin:10px auto;
}

.profile-wrapper img{
    width:100%;
    height:100%;
    border-radius:50%;
    border:3px solid #00f2fe;
}

.ring{
    position:absolute;
    inset:-10px;
    border-radius:50%;
    border-top:2px solid #00f2fe;
    animation:spin 2s linear infinite;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

/* زر الدخول (مصحح) */
.login-btn{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;

    padding:12px 14px;
    border-radius:12px;

    background:rgba(0,242,254,0.12);
    border:1px solid rgba(0,242,254,0.3);

    color:#00f2fe;
    text-decoration:none;
    font-weight:bold;

    margin:15px auto;

    transition:0.3s;
}

.login-btn:hover{
    background:#00f2fe;
    color:#000;
    transform:scale(1.05);
}

/* ========================= */
/* التواصل (مصحح بالكامل) */
/* ========================= */

.social-line{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;

    padding:12px;

    background:rgba(5,8,17,0.7);
    backdrop-filter:blur(10px);

    border-top:1px solid rgba(0,242,254,0.2);

    z-index:9999;
}

.social-line a{
    color:#fff;
    font-size:1.5rem;
    transition:0.3s;
    position:relative;
}

.social-line a::after{
    content:"";
    position:absolute;
    bottom:-6px;
    left:0;
    width:0%;
    height:2px;
    background:#00f2fe;
    transition:0.3s;
}

.social-line a:hover{
    color:#00f2fe;
    transform:translateY(-4px);
}

.social-line a:hover::after{
    width:100%;
}

/* زر الصوت (مصحح مكانه) */
#sound-toggle{
    position:fixed;
    bottom:70px;
    left:20px;

    width:55px;
    height:55px;

    border:none;
    border-radius:50%;

    background:rgba(0,242,254,0.15);
    color:#00f2fe;

    cursor:pointer;
    z-index:10000;
}

</style>
</head>

<body>

<!-- الفيديو -->
<video id="bgVideo" autoplay loop muted playsinline class="background-video">
<source src="video.mp4">
</video>

<div class="grid-overlay"></div>

<!-- زر الصوت -->
<button id="sound-toggle">
<i class="fa-solid fa-volume-high"></i>
</button>

<div class="cyber-card">

<div class="robot-emoji">🤖</div>

<div class="speech-bubble" id="speech">
مرحباً 👋 أنا أشرح عن الموقع
</div>

<div class="profile-wrapper">
<img src="profile.jpg">
<div class="ring"></div>
</div>

<h2>أكاديمية المطور</h2>

<p>منصة تعليم الأمن السيبراني</p>

<!-- زر الدخول مصحح -->
<a class="login-btn" href="https://alikhalid.pythonanywhere.com" target="_blank">
<i class="fa-solid fa-right-to-bracket"></i>
دخول النظام
</a>

</div>

<!-- التواصل مصحح -->
<div class="social-line">

<a href="https://instagram.com/x.5qe" target="_blank">
<i class="fa-brands fa-instagram"></i>
</a>

<a href="https://t.me/c99ol" target="_blank">
<i class="fa-brands fa-telegram"></i>
</a>

<a href="mailto:mmdeedn@gmail.com">
<i class="fa-solid fa-envelope"></i>
</a>

</div>

<script>

/* زر الصوت */
const video = document.getElementById("bgVideo");
const btn = document.getElementById("sound-toggle");

btn.addEventListener("click", async () => {

    video.muted = !video.muted;

    if(!video.muted){
        await video.play();
        btn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>';
    } else {
        btn.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
    }

});

/* الروبوت */
const speech = document.getElementById("speech");

const messages = [
    "مرحباً 👋 أنا مساعد الموقع",
    "هذا موقع المهندس علي المعموري",
    "مختص بالأمن السيبراني 🔐",
    "يتعلم تطوير الويب 💻",
    "منصة تعليمية تفاعلية 🚀"
];

let i = 0;

setInterval(() => {
    i++;
    if(i >= messages.length) i = 0;
    speech.textContent = messages[i];
}, 3000);

</script>

</body>
</html>

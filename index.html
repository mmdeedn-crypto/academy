<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الدخول | المهندس علي المعموري</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* حاوية بطاقة الدخول بتأثير الزجاج */
        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* الهيدر واسم المطور */
        .header h1 {
            color: var(--text-main);
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .developer-badge {
            display: inline-block;
            padding: 6px 14px;
            background: rgba(79, 70, 229, 0.15);
            color: #818cf8;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 24px;
            border: 1px solid rgba(79, 70, 229, 0.3);
            letter-spacing: 0.5px;
        }

        /* حاوية زر الدخول في المنتصف */
        .action-area {
            margin: 40px 0;
            display: flex;
            justify-content: center;
        }

        /* زر الانتقال للموقع */
        .btn-enter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 32px;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.4);
            letter-spacing: 0.5px;
        }

        .btn-enter:hover {
            background: var(--primary-hover);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(79, 70, 229, 0.5);
        }

        .btn-enter:active {
            transform: translateY(-1px);
        }

        /* سهم صغير جمالي داخل الزر */
        .btn-enter::after {
            content: '←';
            font-size: 18px;
            transition: transform 0.3s ease;
        }

        .btn-enter:hover::after {
            transform: translateX(-4px);
        }

        /* الفوتر السفلي */
        .footer-text {
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="developer-badge">بوابة المطور المهندس علي المعموري</div>
        
        <div class="header">
            <h1>أهلاً بك في موقعنا</h1>
            <p>اضغط على الزر أدناه للانتقال السريع والآمن إلى المنصة الخاصة بنا</p>
        </div>

        <div class="action-area">
            <a href="https://alikhalid.pythonanywhere.com" class="btn-enter">دخول الموقع الآن</a>
        </div>

        <div class="footer-text">
            حقوق النشر محفوظة © ٢٠٢٦
        </div>
    </div>

</body>
</html>
